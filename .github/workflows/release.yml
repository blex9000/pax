name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-linux-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-linux-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libgtksourceview-5-dev \
            libfuse2

      - name: Build AppImage
        run: |
          chmod +x scripts/build-appimage.sh
          scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pax-AppImage-x86_64
          path: Pax-*.AppImage

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Pax-*.AppImage
          generate_release_notes: true

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-macos-release-

      - name: Install system dependencies
        run: brew install gtk4 libadwaita gtksourceview5 pkg-config

      - name: Build
        run: cargo build --release --no-default-features --features sourceview

      - name: Package
        run: |
          mkdir -p Pax.app/Contents/MacOS
          mkdir -p Pax.app/Contents/Resources
          cp target/release/pax Pax.app/Contents/MacOS/pax-bin
          cp -r resources/* Pax.app/Contents/Resources/

          # Launcher script: checks for GTK4 deps before running
          cat > Pax.app/Contents/MacOS/pax << 'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"

          # Check if Homebrew is installed
          if ! command -v brew &>/dev/null; then
            osascript -e 'display dialog "Pax requires Homebrew.\n\nInstall it from https://brew.sh and then run:\n\nbrew install gtk4 libadwaita gtksourceview5" buttons {"OK"} default button "OK" with title "Pax — Missing Dependencies" with icon caution'
            exit 1
          fi

          # Check for GTK4
          MISSING=""
          brew list gtk4 &>/dev/null || MISSING="$MISSING gtk4"
          brew list libadwaita &>/dev/null || MISSING="$MISSING libadwaita"
          brew list gtksourceview5 &>/dev/null || MISSING="$MISSING gtksourceview5"

          if [ -n "$MISSING" ]; then
            # Ask user if they want to install
            RESULT=$(osascript -e "display dialog \"Pax needs these packages:\n\n$MISSING\n\nInstall them now via Homebrew?\" buttons {\"Cancel\", \"Install\"} default button \"Install\" with title \"Pax — Missing Dependencies\" with icon caution" 2>&1)
            if echo "$RESULT" | grep -q "Install"; then
              # Open Terminal and run brew install
              osascript -e "tell application \"Terminal\" to do script \"brew install$MISSING && echo 'Done! You can now open Pax.app'\""
              osascript -e "tell application \"Terminal\" to activate"
              exit 0
            else
              exit 1
            fi
          fi

          # All deps present — launch the app
          exec "$DIR/pax-bin" "$@"
          LAUNCHER
          chmod +x Pax.app/Contents/MacOS/pax

          cat > Pax.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Pax</string>
            <key>CFBundleIdentifier</key><string>com.sinelec.pax</string>
            <key>CFBundleExecutable</key><string>pax</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          PLIST
          tar czf Pax-macos-arm64.tar.gz Pax.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pax-macOS-arm64
          path: Pax-macos-arm64.tar.gz

      - name: Add to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Pax-macos-arm64.tar.gz
