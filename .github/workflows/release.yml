name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-linux-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-linux-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libvte-2.91-gtk4-dev \
            libgtksourceview-5-dev \
            libfuse2

      - name: Build AppImage
        run: |
          chmod +x scripts/build-appimage.sh
          scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pax-AppImage-x86_64
          path: Pax-*.AppImage

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Pax-*.AppImage
          generate_release_notes: true

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-macos-release-

      - name: Install system dependencies
        run: |
          brew install gtk4 libadwaita gtksourceview5 pkg-config dylibbundler

      - name: Build
        run: cargo build --release --no-default-features --features sourceview

      - name: Bundle app with all dependencies
        run: |
          set -euo pipefail
          APP="Pax.app"
          MACOS="$APP/Contents/MacOS"
          RES="$APP/Contents/Resources"
          LIB="$APP/Contents/lib"
          SHARE="$APP/Contents/share"

          mkdir -p "$MACOS" "$RES" "$LIB"

          # Copy binary
          cp target/release/pax "$MACOS/pax-bin"

          # Copy app resources
          cp -r resources/* "$RES/"

          # Bundle all dylib dependencies into the .app
          dylibbundler -od -b \
            -x "$MACOS/pax-bin" \
            -d "$LIB" \
            -p @executable_path/../lib/

          # Copy GLib schemas (required for GTK4/libadwaita)
          BREW_PREFIX="$(brew --prefix)"
          mkdir -p "$SHARE/glib-2.0/schemas"
          cp "$BREW_PREFIX/share/glib-2.0/schemas/gschemas.compiled" "$SHARE/glib-2.0/schemas/" 2>/dev/null || true
          # Compile schemas if compiled version doesn't exist
          if [ ! -f "$SHARE/glib-2.0/schemas/gschemas.compiled" ]; then
            glib-compile-schemas "$BREW_PREFIX/share/glib-2.0/schemas" --targetdir="$SHARE/glib-2.0/schemas/"
          fi

          # Copy GDK pixbuf loaders
          GDK_PIXBUF_DIR="$BREW_PREFIX/lib/gdk-pixbuf-2.0"
          if [ -d "$GDK_PIXBUF_DIR" ]; then
            mkdir -p "$LIB/gdk-pixbuf-2.0"
            cp -r "$GDK_PIXBUF_DIR"/* "$LIB/gdk-pixbuf-2.0/"
          fi

          # Copy icon themes (hicolor + Adwaita for symbolic icons)
          mkdir -p "$SHARE/icons"
          if [ -d "$BREW_PREFIX/share/icons/hicolor" ]; then
            cp -r "$BREW_PREFIX/share/icons/hicolor" "$SHARE/icons/"
          fi
          if [ -d "$BREW_PREFIX/share/icons/Adwaita" ]; then
            cp -r "$BREW_PREFIX/share/icons/Adwaita" "$SHARE/icons/"
          fi

          # Copy GtkSourceView language specs and styles
          SV_DIR="$BREW_PREFIX/share/gtksourceview-5"
          if [ -d "$SV_DIR" ]; then
            mkdir -p "$SHARE/gtksourceview-5"
            cp -r "$SV_DIR"/* "$SHARE/gtksourceview-5/"
          fi

          # Copy custom sourceview styles
          if [ -d "resources/sourceview-styles" ]; then
            cp resources/sourceview-styles/*.xml "$SHARE/gtksourceview-5/styles/" 2>/dev/null || true
          fi

          # Launcher script that sets up environment for bundled libs
          cat > "$MACOS/pax" << 'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          CONTENTS="$(dirname "$DIR")"

          export DYLD_LIBRARY_PATH="$CONTENTS/lib:$DYLD_LIBRARY_PATH"
          export XDG_DATA_DIRS="$CONTENTS/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
          export GSETTINGS_SCHEMA_DIR="$CONTENTS/share/glib-2.0/schemas"
          export GDK_PIXBUF_MODULE_FILE="$CONTENTS/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"
          export GTK_PATH="$CONTENTS/lib/gtk-4.0"

          exec "$DIR/pax-bin" "$@"
          LAUNCHER
          chmod +x "$MACOS/pax"

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Pax</string>
            <key>CFBundleIdentifier</key><string>com.sinelec.pax</string>
            <key>CFBundleExecutable</key><string>pax</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          # Create a DMG with drag-to-Applications layout
          mkdir -p dmg_contents
          cp -r Pax.app dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "Pax" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            Pax-macos-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pax-macOS-arm64
          path: Pax-macos-arm64.dmg

      - name: Add to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Pax-macos-arm64.dmg
